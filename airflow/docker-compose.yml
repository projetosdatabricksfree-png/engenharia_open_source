x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR:              ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:  ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY:            ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY:       ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES:         "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG:    "true"
    AIRFLOW__API__AUTH_BACKENDS:          "airflow.api.auth.backend.basic_auth"
    # PostgreSQL (para os jobs)
    POSTGRES_HOST:     ${POSTGRES_HOST:-postgres}
    POSTGRES_PORT:     ${POSTGRES_PORT:-5432}
    POSTGRES_DB:       ${POSTGRES_DB:-brasileirao}
    POSTGRES_USER:     ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    SPARK_MASTER_URL: ${SPARK_MASTER_URL:-spark://spark-master:7077}
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
    - ../spark/jobs:/opt/spark-jobs:ro
    - ../dbt:/opt/dbt:ro
    - //var/run/docker.sock:/var/run/docker.sock
  networks:
    - stack-net
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  postgres-airflow:
    image: postgres:15-alpine
    container_name: airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB:       airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    networks:
      - stack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USER:-airflow} \
          --password ${AIRFLOW_PASSWORD:-airflow} \
          --firstname Admin \
          --lastname Airflow \
          --role Admin \
          --email ${AIRFLOW_EMAIL:-airflow@brasileirao.local} || true
        airflow connections add spark_default \
          --conn-type spark \
          --conn-host spark://spark-master \
          --conn-port 7077 || true
        airflow connections add postgres_brasileirao \
          --conn-type postgres \
          --conn-host postgres \
          --conn-port 5432 \
          --conn-schema brasileirao \
          --conn-login admin \
          --conn-password admin || true
        echo "[OK] Airflow inicializado."
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    restart: unless-stopped
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    restart: unless-stopped
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_logs:
    name: stack-airflow-logs
  airflow_plugins:
    name: stack-airflow-plugins
  airflow_pg_data:
    name: stack-airflow-pg

networks:
  stack-net:
    external: true
    name: stack-net
