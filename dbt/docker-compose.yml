services:
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.1
    container_name: dbt
    restart: unless-stopped
    environment:
      POSTGRES_HOST:     ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-brasileirao}
      POSTGRES_USER:     ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - ./:/usr/app/dbt
      - ./profiles.yml:/root/.dbt/profiles.yml:ro
    working_dir: /usr/app/dbt
    networks:
      - stack-net
    # Container fica vivo para receber docker exec
    entrypoint: ["tail", "-f", "/dev/null"]

networks:
  stack-net:
    external: true
    name: stack-net
